# 英雄任务技术闭环：可信库存主链 + 自动空间影子门 + 视觉裁定层。
#
# 自动空间使用真实 new_1 视频生成并已拉回的观测；shadow_only 保留其
# NEEDS_USER / 0 AUTO_ACCEPTED 原结论。独立 space_review 以帧 SHA、候选 ID、
# track ID 和视觉几何裁定五个冻结目标，下游显式读取 VISUALLY_ADJUDICATED
# 产物。严格自动替换仍由 hero_pipeline_s1_final.yaml 承担。
run_dir: results/hero/s1-technical-closure
trace_id: hero-s1-technical-closure
python: .venv/bin/python

stages:
  inventory:
    enabled: true
    entities: results/hero_s1/reid-final/entities.jsonl
    items: fixtures/hero_s1/items.json
    anchor_review: fixtures/hero_s1/annotations/anchor_review.confirmed.json
    max_clarifications: 4

  space:
    enabled: true
    shadow_only: true
    video_id: new_1
    observations: results/hero_s1/space-auto/auto_observations.jsonl
    min_regions: 5
    min_observations: 2
    min_confidence: 0.75
    min_hard_field_confidence: 0.70
    min_power_confidence: 0.70
    min_field_consensus: 0.67
    dedupe_iou: 0.35
    expected_anchor:
      - study_desk
      - vanity
      - wall_shelf
      - chest_of_drawers
      - display_cabinet

  space_review:
    enabled: true
    review: fixtures/hero_s1/annotations/space_visual_adjudication.codex-v1.json
    evidence_frames:
      - results/acceptance/HERO_S1/space-visual-adjudication-v1/frames/kf_003240.jpg
      - results/acceptance/HERO_S1/space-visual-adjudication-v1/frames/kf_004260.jpg
      - results/acceptance/HERO_S1/space-visual-adjudication-v1/frames/kf_005040.jpg
      - results/acceptance/HERO_S1/space-visual-adjudication-v1/frames/kf_005640.jpg

  regions:
    enabled: true
    source: visual_adjudication

  group:
    enabled: true
    trusted_inventory: true
    closure: fixtures/hero_s1/technical_closure.json

  layout:
    enabled: true

  taskcards:
    enabled: true

  risk:
    enabled: true
    closure: fixtures/hero_s1/technical_closure.json
    # 规则实现保留并输出诊断；当前范围为 DEFERRED/non-blocking。
    facts: fixtures/hero_s1/risk_facts.pending.json

  verify:
    enabled: false  # 可选的搬后执行复核；不阻塞库存→空间→布局→任务卡技术闭环

  trace:
    enabled: true
    strict: false

  report:
    enabled: true

  bundle:
    enabled: true
