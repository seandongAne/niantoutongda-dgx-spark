# 英雄主链 · 技术闭环最终跑。
#
# 用法:
#   .venv/bin/python scripts/hero_pipeline.py --config configs/hero_pipeline_s1_final.yaml
#
# 数据边界:
#   - 3306 个 raw ReID 实体只进入 inventory 审计层；下游只消费 20 个
#     data-owner-confirmed 的稳定 hero_<canonical_id> 实体。
#   - 3 个生活组合与 2 个技术装箱单元覆盖全部 20 项，layout/taskcards 消费
#     placement_groups.jsonl，不再读取 raw 实体或 677 条原始澄清。
#   - space_observe 从现有 new_1.mp4 自动产观测，并由 Spark-local Nemotron VLM
#     生成通用 anchor 假设；space 以全局一对一门选出恰好五区后才生成
#     RegionManifest。人工视觉只在独立 scorer 真值侧出现，不进入生产器。
#   - 真实摆放照片只用于可选的物理执行复核，不是本轮技术闭环门；本配置不伪造
#     presence/compliance。
run_dir: results/hero/s1-final
trace_id: hero-s1-final
python: .venv/bin/python

stages:
  healthcheck:
    enabled: true

  ingest:
    enabled: false    # 产物在盘(results/hero_s1/ingest),输入未变,不重跑

  attributes:
    enabled: false    # 产物在盘(results/s5/attributes_hero_s1.jsonl),输入未变,不重跑

  reid:
    enabled: true
    spark_cmd: >-
      source ~/venv/bin/activate && cd ~/proj &&
      python scripts/reid_task.py
      --ingest-root results/hero_s1/ingest
      --vocab fixtures/hero_s1/vocab.json
      --config configs/reid_hero_s1_final.yaml
      --attributes results/s5/attributes_hero_s1.jsonl
      --out results/hero_s1/reid-final

  space_observe:
    enabled: true
    # 104 秒现有新家视频；家具/插座为独立开放词汇，不含人工 region/anchor ID。
    # ingest 中间帧与裁剪留在 Spark local-data，不经 SSH 回传；仅拉小型 JSON 产物。
    spark_cmd: >-
      source ~/venv/bin/activate && cd ~/proj &&
      python scripts/ingest_task.py
      --out local-data/hero_s1/space-ingest
      --config-version hero-s1-space-v1
      --vocab fixtures/hero_s1/space_vocab.json
      --box-threshold 0.25
      --tile-box-threshold 0.22
      --frame-batch-size 2
      --no-stationary-tiles
      --videos new_1=local-data/hero_s1/new_1.mp4 &&
      python scripts/space_observation_adapter.py
      --ingest-dir local-data/hero_s1/space-ingest/new_1
      --vocab fixtures/hero_s1/space_vocab.json
      --out-dir results/hero_s1/space-auto
      --video-id new_1 &&
      curl -fsS http://127.0.0.1:8000/v1/models >/dev/null &&
      python scripts/space_anchor_classifier.py
      --observations results/hero_s1/space-auto/auto_observations.jsonl
      --ingest-dir local-data/hero_s1/space-ingest/new_1
      --out-dir results/hero_s1/space-anchor
      --evidence-dir local-data/hero_s1/space-anchor-evidence
      --expected-anchor study_desk
      --expected-anchor vanity
      --expected-anchor wall_shelf
      --expected-anchor chest_of_drawers
      --expected-anchor display_cabinet
      --concurrency 8

  pull:
    enabled: true
    # space_observe 每次重跑后必须拉取同一批新产物，禁止沿用旧本地观测。
    always_run: true
    cmd: [scripts/pull_results.sh]
    local_outputs:
      - results/hero_s1/reid-final/entities.jsonl
      - results/hero_s1/reid-final/clarifications.jsonl
      - results/hero_s1/reid-final/metrics.json
      - results/s5/attributes_hero_s1.jsonl
      - results/hero_s1/space-auto/auto_observations.jsonl
      - results/hero_s1/space-auto/metrics.json
      - results/hero_s1/space-auto/hashes.json
      - results/hero_s1/space-anchor/anchor_candidates.json
      - results/hero_s1/space-anchor/metrics.json
      - results/hero_s1/space-anchor/hashes.json

  inventory:
    enabled: true
    entities: results/hero_s1/reid-final/entities.jsonl
    items: fixtures/hero_s1/items.json
    anchor_review: fixtures/hero_s1/annotations/anchor_review.confirmed.json
    max_clarifications: 4

  naming:
    enabled: false   # inventory/display.jsonl 是唯一命名与实体白名单

  narration:
    enabled: false   # 组合已由 data owner 最终确认并冻结在 technical_closure

  space:
    enabled: true
    video_id: new_1
    observations: results/hero_s1/space-auto/auto_observations.jsonl
    observation_hashes: results/hero_s1/space-auto/hashes.json
    anchor_candidates: results/hero_s1/space-anchor/anchor_candidates.json
    anchor_hashes: results/hero_s1/space-anchor/hashes.json
    min_regions: 5
    min_observations: 2
    min_confidence: 0.75
    min_hard_field_confidence: 0.70
    min_power_confidence: 0.70
    min_field_consensus: 0.67
    dedupe_iou: 0.35
    min_anchor_vote_share: 0.60
    min_vlm_mean_confidence: 0.50
    min_assignment_score: 0.70
    min_assignment_margin: 0.05
    expected_anchor:
      - study_desk
      - vanity
      - wall_shelf
      - chest_of_drawers
      - display_cabinet

  space_score:
    enabled: true
    # 语义真值无 candidate/track/region ID；只评分，永不生成或改写 regions。
    truth: fixtures/hero_s1/space_truth.semantic-v1.json
    required_expected_anchor_count: 5

  regions:
    enabled: true
    source: auto
    # 严格自动链只读 run/spatial/regions.json；配置层禁止同时出现 manifest。

  group:
    enabled: true
    trusted_inventory: true
    closure: fixtures/hero_s1/technical_closure.json

  layout:
    enabled: true

  taskcards:
    enabled: true

  risk:
    enabled: true
    closure: fixtures/hero_s1/technical_closure.json
    # 规则引擎照常产生诊断事实；scope=DEFERRED/non-blocking，不据空房视频宣称安全。
    facts: fixtures/hero_s1/risk_facts.pending.json

  verify:
    enabled: false                                # 可选的搬后执行复核；不阻塞技术闭环
    photos: fixtures/hero_s1/acceptance.json

  trace:
    enabled: true
    # 仅在选择补做物理执行复核时，把 verify 与 strict 一起开启。
    strict: false

  report:
    enabled: true

  bundle:
    enabled: true
